name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui test (senza database/servizi esterni)
        env:
          DATABASE_URL: "postgresql+psycopg://user:pass@localhost:5432/testdb"
          WEATHER_BASE_URL: "https://wttr.in"
          WEATHER_TIMEOUT: "10"
          LOG_LEVEL: "INFO"
          GEMINI_API_KEY: "fake-key-for-ci"
        run: python -m tests.test_machine_service
              
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Build immagine Docker
        run: docker build -t industrial-ai-mcp:${{ github.sha }} .
